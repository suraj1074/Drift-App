<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <!-- Background -->
  <rect width="1080" height="1920" fill="#EEEDFF"/>
  
  <!-- Caption -->
  <text x="540" y="140" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="700" fill="#2C2C2C">
    Set your lens. Week, month, quarter.
  </text>
  
  <!-- Phone frame -->
  <rect x="90" y="220" width="900" height="1620" rx="50" fill="#1A1A2E" stroke="#333" stroke-width="2"/>
  <rect x="105" y="260" width="870" height="1540" rx="40" fill="#FCFBF8"/>
  
  <!-- Status bar -->
  <text x="160" y="302" font-family="Inter, Arial, sans-serif" font-size="18" fill="#2C2C2C">9:41</text>
  
  <!-- Top bar -->
  <text x="160" y="370" font-family="Inter, Arial, sans-serif" font-size="16" fill="#2C2C2C">←</text>
  <text x="200" y="370" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#2C2C2C">My Goals</text>
  
  <!-- Heading -->
  <text x="160" y="445" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600" fill="#2C2C2C" letter-spacing="-0.3">
    What would make this week a win?
  </text>
  
  <!-- Horizon chips -->
  <rect x="160" y="475" width="130" height="42" rx="12" fill="#EEEDFF" stroke="#5B5BD6" stroke-width="2"/>
  <text x="192" y="502" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5B5BD6">🗓️ Week</text>
  
  <rect x="305" y="475" width="140" height="42" rx="12" fill="#F5F3EE"/>
  <text x="335" y="502" font-family="Inter, Arial, sans-serif" font-size="16" fill="#6B6B6B">📅 Month</text>
  
  <rect x="460" y="475" width="150" height="42" rx="12" fill="#F5F3EE"/>
  <text x="490" y="502" font-family="Inter, Arial, sans-serif" font-size="16" fill="#6B6B6B">🎯 Quarter</text>
  
  <!-- Input area -->
  <rect x="130" y="545" width="820" height="60" rx="16" fill="#F5F3EE"/>
  <text x="165" y="582" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B6B6B" opacity="0.5">
    e.g. File my taxes and run 3 times
  </text>
  
  <!-- Set Goal button -->
  <rect x="130" y="625" width="820" height="58" rx="14" fill="#5B5BD6"/>
  <text x="540" y="662" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#FFFFFF">
    Set Goal 🌱
  </text>
  
  <!-- ACTIVE GOALS label -->
  <text x="160" y="740" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#6B6B6B" letter-spacing="0.8">
    ACTIVE GOALS
  </text>
  
  <!-- Goal card 1 -->
  <rect x="130" y="765" width="820" height="100" rx="16" fill="#EEEDFF"/>
  <text x="165" y="810" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#2C2C2C">
    File taxes and run 3 times
  </text>
  <text x="165" y="838" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B5BD6">
    This week
  </text>
  <text x="870" y="815" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5B5BD6">
    Done ✓
  </text>
  
  <!-- Goal card 2 -->
  <rect x="130" y="885" width="820" height="100" rx="16" fill="#EEEDFF"/>
  <text x="165" y="930" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#2C2C2C">
    Finish Atomic Habits
  </text>
  <text x="165" y="958" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B5BD6">
    This month
  </text>
  <text x="870" y="935" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5B5BD6">
    Done ✓
  </text>
  
  <!-- Goal card 3 -->
  <rect x="130" y="1005" width="820" height="100" rx="16" fill="#EEEDFF"/>
  <text x="165" y="1050" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#2C2C2C">
    Launch side project MVP
  </text>
  <text x="165" y="1078" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B5BD6">
    This quarter
  </text>
  <text x="870" y="1055" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5B5BD6">
    Done ✓
  </text>
</svg>