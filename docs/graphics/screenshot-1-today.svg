<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <!-- Background -->
  <rect width="1080" height="1920" fill="#EEEDFF"/>
  
  <!-- Caption area -->
  <text x="540" y="140" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="700" fill="#2C2C2C">
    Your AI picks what matters today
  </text>
  
  <!-- Phone frame -->
  <rect x="90" y="220" width="900" height="1620" rx="50" fill="#1A1A2E" stroke="#333" stroke-width="2"/>
  <rect x="105" y="260" width="870" height="1540" rx="40" fill="#FCFBF8"/>
  
  <!-- Status bar -->
  <rect x="105" y="260" width="870" height="50" rx="40" fill="#FCFBF8"/>
  <text x="160" y="292" font-family="Inter, Arial, sans-serif" font-size="18" fill="#2C2C2C">9:41</text>
  
  <!-- Top bar -->
  <text x="160" y="360" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#2C2C2C" letter-spacing="1">drift</text>
  <!-- Refresh icon placeholder -->
  <circle cx="910" cy="350" r="16" fill="none" stroke="#6B6B6B" stroke-width="2"/>
  <path d="M904,344 A8,8 0 1,1 916,350" fill="none" stroke="#6B6B6B" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Greeting -->
  <text x="160" y="440" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600" fill="#2C2C2C" letter-spacing="-0.3">
    Hey! Solid start to the week.
  </text>
  
  <!-- FOCUS TODAY label -->
  <text x="160" y="510" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#5B5BD6" letter-spacing="0.8">
    FOCUS TODAY
  </text>
  
  <!-- Focus Card 1 -->
  <rect x="130" y="535" width="820" height="170" rx="20" fill="#EEEDFF"/>
  <text x="170" y="580" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#2D2B55">
    ✦ File your tax return today
  </text>
  <text x="170" y="615" font-family="Inter, Arial, sans-serif" font-size="17" fill="#2D2B55" opacity="0.7">
    Deadline is Friday — knock it out while it's fresh.
  </text>
  <rect x="170" y="640" width="200" height="34" rx="8" fill="#5B5BD6" opacity="0.1"/>
  <text x="185" y="663" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B5BD6">
    🎯 File taxes this week
  </text>
  
  <!-- Focus Card 2 -->
  <rect x="130" y="725" width="820" height="170" rx="20" fill="#EEEDFF"/>
  <text x="170" y="770" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#2D2B55">
    ✦ Go for a 20-min run
  </text>
  <text x="170" y="805" font-family="Inter, Arial, sans-serif" font-size="17" fill="#2D2B55" opacity="0.7">
    You said 3x/week — this gets you to two.
  </text>
  <rect x="170" y="830" width="240" height="34" rx="8" fill="#5B5BD6" opacity="0.1"/>
  <text x="185" y="853" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B5BD6">
    🎯 Get back into running
  </text>

  <!-- PARKED FOR NOW -->
  <text x="160" y="960" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#6B6B6B" letter-spacing="0.8">
    PARKED FOR NOW
  </text>
  <rect x="130" y="980" width="820" height="60" rx="14" fill="#F5F3EE"/>
  <text x="170" y="1018" font-family="Inter, Arial, sans-serif" font-size="17" fill="#6B6B6B">
    💤 Start that side project — not this week
  </text>
  
  <!-- Goals card -->
  <rect x="130" y="1080" width="820" height="100" rx="14" fill="#FFF3E0"/>
  <text x="185" y="1125" font-family="Inter, Arial, sans-serif" font-size="26">🌱</text>
  <text x="225" y="1120" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#4E3B1F">
    My Goals
  </text>
  <text x="225" y="1150" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4E3B1F" opacity="0.7">
    What would make this week a win?
  </text>
  
  <!-- Bottom nav -->
  <rect x="105" y="1680" width="870" height="120" rx="0" fill="#FFFFFF"/>
  <line x1="105" y1="1680" x2="975" y2="1680" stroke="#E0DDD6" stroke-width="1"/>
  
  <!-- Today tab (active) -->
  <text x="280" y="1735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#5B5BD6">★</text>
  <text x="280" y="1765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#5B5BD6">Today</text>
  
  <!-- Dump tab -->
  <text x="540" y="1735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#6B6B6B">+</text>
  <text x="540" y="1765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6B6B6B">Dump</text>
  
  <!-- My Stuff tab -->
  <text x="800" y="1735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#6B6B6B">☰</text>
  <text x="800" y="1765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6B6B6B">My Stuff</text>
</svg>