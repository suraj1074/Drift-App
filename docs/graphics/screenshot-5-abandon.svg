<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <!-- Background -->
  <rect width="1080" height="1920" fill="#FFF3E0"/>
  
  <!-- Caption -->
  <text x="540" y="100" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="44" font-weight="700" fill="#2C2C2C">
    Continue, pause, or let go
  </text>
  <text x="540" y="160" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="44" font-weight="700" fill="#2C2C2C">
    — you choose
  </text>
  
  <!-- Phone frame -->
  <rect x="90" y="220" width="900" height="1620" rx="50" fill="#1A1A2E" stroke="#333" stroke-width="2"/>
  <rect x="105" y="260" width="870" height="1540" rx="40" fill="#FCFBF8"/>
  
  <!-- Status bar -->
  <text x="160" y="302" font-family="Inter, Arial, sans-serif" font-size="18" fill="#2C2C2C">9:41</text>
  
  <!-- Top bar -->
  <text x="160" y="370" font-family="Inter, Arial, sans-serif" font-size="16" fill="#2C2C2C">←</text>
  <text x="200" y="370" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#2C2C2C">My Stuff</text>
  
  <!-- Zoomed-in card with prominent action chips -->
  <!-- Item heavily drifting -->
  <rect x="130" y="420" width="820" height="320" rx="20" fill="#FFF0ED"/>
  
  <text x="170" y="475" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600" fill="#2C2C2C">
    Start that side project
  </text>
  
  <!-- Drift badge - prominent -->
  <rect x="170" y="500" width="240" height="36" rx="8" fill="#D4634B" opacity="0.12"/>
  <text x="190" y="525" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" fill="#D4634B">
    ⚠️ Drifting — 12 days
  </text>
  
  <!-- Large action chips - the hero of this screenshot -->
  <rect x="170" y="565" width="150" height="52" rx="12" fill="#EEEDFF" stroke="#5B5BD6" stroke-width="1.5"/>
  <text x="200" y="598" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5B5BD6">👆 Touch</text>
  
  <rect x="335" y="565" width="140" height="52" rx="12" fill="#EEEDFF" stroke="#5B5BD6" stroke-width="1.5"/>
  <text x="365" y="598" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5B5BD6">✓ Done</text>
  
  <rect x="490" y="565" width="145" height="52" rx="12" fill="#FFF3E0" stroke="#F5A623" stroke-width="1.5"/>
  <text x="518" y="598" font-family="Inter, Arial, sans-serif" font-size="18" fill="#F5A623">💤 Pause</text>
  
  <rect x="650" y="565" width="150" height="52" rx="12" fill="#FFF0ED" stroke="#D4634B" stroke-width="1.5"/>
  <text x="678" y="598" font-family="Inter, Arial, sans-serif" font-size="18" fill="#D4634B">👋 Let go</text>
  
  <!-- Explanatory text below -->
  <text x="170" y="680" font-family="Inter, Arial, sans-serif" font-size="16" fill="#6B6B6B">
    You said this mattered. Still true?
  </text>
  
  <!-- Second item - paused -->
  <rect x="130" y="780" width="820" height="260" rx="20" fill="#FFFFFF" stroke="#E0DDD6" stroke-width="1"/>
  
  <text x="170" y="835" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600" fill="#2C2C2C">
    Learn to cook Italian food
  </text>
  
  <rect x="170" y="858" width="220" height="36" rx="8" fill="#D4634B" opacity="0.12"/>
  <text x="190" y="883" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" fill="#D4634B">
    ⚠️ Drifting — 9 days
  </text>
  
  <rect x="170" y="915" width="150" height="52" rx="12" fill="#F5F3EE"/>
  <text x="200" y="948" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B6B6B">👆 Touch</text>
  <rect x="335" y="915" width="140" height="52" rx="12" fill="#F5F3EE"/>
  <text x="365" y="948" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B6B6B">✓ Done</text>
  <rect x="490" y="915" width="145" height="52" rx="12" fill="#F5F3EE"/>
  <text x="518" y="948" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B6B6B">💤 Pause</text>
  <rect x="650" y="915" width="150" height="52" rx="12" fill="#F5F3EE"/>
  <text x="678" y="948" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B6B6B">👋 Let go</text>
  
  <!-- Bottom nav -->
  <rect x="105" y="1680" width="870" height="120" fill="#FFFFFF"/>
  <line x1="105" y1="1680" x2="975" y2="1680" stroke="#E0DDD6" stroke-width="1"/>
  <text x="280" y="1735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#6B6B6B">★</text>
  <text x="280" y="1765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6B6B6B">Today</text>
  <text x="540" y="1735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#6B6B6B">+</text>
  <text x="540" y="1765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6B6B6B">Dump</text>
  <text x="800" y="1735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#5B5BD6">☰</text>
  <text x="800" y="1765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#5B5BD6">My Stuff</text>
</svg>