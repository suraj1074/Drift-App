<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <!-- Background -->
  <rect width="1080" height="1920" fill="#FFF0ED"/>
  
  <!-- Caption -->
  <text x="540" y="140" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="700" fill="#2C2C2C">
    Nothing silently slips away
  </text>
  
  <!-- Phone frame -->
  <rect x="90" y="220" width="900" height="1620" rx="50" fill="#1A1A2E" stroke="#333" stroke-width="2"/>
  <rect x="105" y="260" width="870" height="1540" rx="40" fill="#FCFBF8"/>
  
  <!-- Status bar -->
  <text x="160" y="302" font-family="Inter, Arial, sans-serif" font-size="18" fill="#2C2C2C">9:41</text>
  
  <!-- Top bar -->
  <text x="160" y="370" font-family="Inter, Arial, sans-serif" font-size="16" fill="#2C2C2C">←</text>
  <text x="200" y="370" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#2C2C2C">My Stuff</text>
  
  <!-- Item 1 — Drifting (red card) -->
  <rect x="130" y="420" width="820" height="230" rx="16" fill="#FFF0ED"/>
  <text x="165" y="465" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#2C2C2C">
    Finish reading Atomic Habits
  </text>
  <!-- Drift badge -->
  <rect x="165" y="482" width="200" height="30" rx="7" fill="#D4634B" opacity="0.1"/>
  <text x="180" y="503" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#D4634B">
    ⚠️ Drifting — 7 days
  </text>
  <!-- Action chips -->
  <rect x="165" y="530" width="110" height="38" rx="10" fill="#F5F3EE"/>
  <text x="185" y="555" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">👆 Touch</text>
  <rect x="285" y="530" width="100" height="38" rx="10" fill="#F5F3EE"/>
  <text x="305" y="555" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">✓ Done</text>
  <rect x="395" y="530" width="110" height="38" rx="10" fill="#F5F3EE"/>
  <text x="415" y="555" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">💤 Pause</text>
  <rect x="515" y="530" width="120" height="38" rx="10" fill="#F5F3EE"/>
  <text x="535" y="555" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">👋 Let go</text>
  
  <!-- Item 2 — Touched today (white card) -->
  <rect x="130" y="680" width="820" height="230" rx="16" fill="#FFFFFF" stroke="#E0DDD6" stroke-width="1"/>
  <text x="165" y="725" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#2C2C2C">
    File tax return
  </text>
  <!-- Touched badge -->
  <rect x="165" y="742" width="180" height="30" rx="7" fill="#F5F3EE"/>
  <text x="180" y="763" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6B6B6B">
    ✓ Touched today
  </text>
  <!-- Action chips -->
  <rect x="165" y="790" width="110" height="38" rx="10" fill="#F5F3EE"/>
  <text x="185" y="815" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">👆 Touch</text>
  <rect x="285" y="790" width="100" height="38" rx="10" fill="#F5F3EE"/>
  <text x="305" y="815" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">✓ Done</text>
  <rect x="395" y="790" width="110" height="38" rx="10" fill="#F5F3EE"/>
  <text x="415" y="815" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">💤 Pause</text>
  <rect x="515" y="790" width="120" height="38" rx="10" fill="#F5F3EE"/>
  <text x="535" y="815" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">👋 Let go</text>

  <!-- Item 3 — Drifting slightly (white card) -->
  <rect x="130" y="940" width="820" height="230" rx="16" fill="#FFFFFF" stroke="#E0DDD6" stroke-width="1"/>
  <text x="165" y="985" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#2C2C2C">
    Call mom this weekend
  </text>
  <rect x="165" y="1002" width="160" height="30" rx="7" fill="#F5F3EE"/>
  <text x="180" y="1023" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6B6B6B">
    3 days ago
  </text>
  <rect x="165" y="1050" width="110" height="38" rx="10" fill="#F5F3EE"/>
  <text x="185" y="1075" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">👆 Touch</text>
  <rect x="285" y="1050" width="100" height="38" rx="10" fill="#F5F3EE"/>
  <text x="305" y="1075" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">✓ Done</text>
  <rect x="395" y="1050" width="110" height="38" rx="10" fill="#F5F3EE"/>
  <text x="415" y="1075" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">💤 Pause</text>
  <rect x="515" y="1050" width="120" height="38" rx="10" fill="#F5F3EE"/>
  <text x="535" y="1075" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B6B6B">👋 Let go</text>
  
  <!-- Bottom nav -->
  <rect x="105" y="1680" width="870" height="120" fill="#FFFFFF"/>
  <line x1="105" y1="1680" x2="975" y2="1680" stroke="#E0DDD6" stroke-width="1"/>
  <text x="280" y="1735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#6B6B6B">★</text>
  <text x="280" y="1765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6B6B6B">Today</text>
  <text x="540" y="1735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#6B6B6B">+</text>
  <text x="540" y="1765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6B6B6B">Dump</text>
  <text x="800" y="1735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#5B5BD6">☰</text>
  <text x="800" y="1765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#5B5BD6">My Stuff</text>
</svg>